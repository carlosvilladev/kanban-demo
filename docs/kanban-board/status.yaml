notes: >-
  Core/foundation feature. Defines the shared Task/Column/BoardState type model
  and the single-source-of-truth board store (BoardProvider/useBoard) consumed
  by persistence-seed (supplies initialState + auto-save) and drag-and-drop
  (adds an atomic MOVE_TASK action). Scope: FR-B1/B2/B3 + FR-T1..T5, NFR-3/NFR-5.
  Out of scope (sibling features): column CRUD (none in v1), drag-and-drop,
  localStorage persistence/seed/reset, and auth gating (demo-auth). Planned
  autonomously/non-interactively per orchestrator directive; open choices are
  recorded under "Assumptions" in spec/spec.md. Left as draft (trust=supervised)
  pending human review/approval before /nybo-run.
